        "mainEntity": [
          { "@type": "Question", "name": "Do I need a card to start the trial?", "acceptedAnswer": { "@type": "Answer", "text": "No. Your 14-day trial starts when you pick a plan. No payment details needed until you subscribe." } },

          { "@type": "Question", "name": "Is my data safe?", "acceptedAnswer": { "@type": "Answer", "text": "Yes. All data is encrypted in transit and at rest. Hosted on AWS infrastructure. Data is retained for seven years after cancellation for compliance purposes." } },
          { "@type": "Question", "name": "Can I use MiseOS on my phone?", "acceptedAnswer": { "@type": "Answer", "text": "Yes. MiseOS is mobile-first. It works in any browser on any device. A native app with push notifications is on the roadmap." } },
          { "@type": "Question", "name": "What if I have multiple sites?", "acceptedAnswer": { "@type": "Answer", "text": "Multi-site is supported. Each additional site is billed at the same low per-site rate. Compliance records are kept per site." } },
